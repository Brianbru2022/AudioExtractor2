name: Windows Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Windows bundles for workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: windows-[bundle]

      - name: Build and publish Windows release bundles
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: Audio Extractor 2 ${{ github.ref_name }}
          releaseBody: |
            Windows desktop bundles for Audio Extractor 2.

            Notes:
            - This release currently packages the Tauri desktop shell.
            - The local FastAPI worker remains a separate runtime component.
          releaseDraft: true
          prerelease: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: windows-[bundle]
